services:
  - type: web
    name: smart-college-it-finder-backend
    env: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build && cd .. &&
      pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_VERSION
        value: 18.19.0
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/health
    preDeployCommand: |
      echo "Verifying Python environment..."
      python --version
      pip --version
