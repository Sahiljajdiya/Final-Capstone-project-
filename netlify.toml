# Netlify configuration for deploying the React frontend

[build]
  command = "npm install && npm run build"
  publish = "dist"
  base = "frontend"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables
[build.environment]
  VITE_API_URL = "https://final-capstone-backend-chpa.onrender.com"

[context.production]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"
  publish = "dist"
